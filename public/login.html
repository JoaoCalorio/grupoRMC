<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login</title>
  <style>
    :root{--bg:#f4f6f8;--card:#fff;--accent:#2b6cb0;--danger:#e53e3e;--muted:#6b7280}
    *{box-sizing:border-box}
    body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#eef2f6,#f8fafc)}
    .card{width:360px;background:var(--card);padding:28px;border-radius:10px;box-shadow:0 6px 20px rgba(27,40,60,0.08);font-family:Inter,Segoe UI,Roboto,Arial,sans-serif}
    h1{margin:0 0 12px;font-size:20px;color:#102a43}
    p.subtitle{margin:0 0 20px;color:var(--muted);font-size:14px}
    label{display:block;font-size:13px;color:#334155;margin-bottom:6px}
    input[type="text"],input[type="password"]{width:100%;padding:10px 12px;border:1px solid #e6edf3;border-radius:8px;font-size:14px;background:#fbfdff}
    .row{margin-bottom:14px}
    button{width:100%;padding:11px;border:0;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    .error{color:var(--danger);font-size:13px;margin-top:10px;text-align:center;display:none}
    .success{color:green;font-size:13px;margin-top:10px;text-align:center;display:none}
    .creds{margin-top:14px;background:#f1f5f9;padding:10px;border-radius:8px;color:#0f172a;font-size:13px}
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Acesso ao Sistema</h1>
    <p class="subtitle">Entre com seu usuário e senha</p>

    <form id="loginForm" autocomplete="off" novalidate>
      <div class="row">
        <label for="username">Usuário</label>
        <input id="username" name="username" type="text" autocomplete="username" required />
      </div>

      <div class="row">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>

      <div class="row">
        <button id="btnLogin" type="submit">Entrar</button>
      </div>

      <div id="error" class="error" role="status" aria-live="polite"></div>
      <div id="success" class="success" role="status" aria-live="polite">Autenticado com sucesso.</div>

      <div class="creds">
        admin / admin<br/>
        operador / operador
      </div>
    </form>
  </main>

  <script>
    (function () {
      const VALID = { admin: 'admin', operador: 'operador' };
      const MAX_ATTEMPTS = 5;
      const BLOCK_SECONDS = 10;

      function attemptsKey(user){ return `login_attempts:${user}`; }
      function blockKey(user){ return `login_block:${user}`; }

      const form = document.getElementById('loginForm');
      const userEl = document.getElementById('username');
      const passEl = document.getElementById('password');
      const errEl = document.getElementById('error');
      const successEl = document.getElementById('success');
      const btn = document.getElementById('btnLogin');

      function showError(msg){ errEl.textContent = msg; errEl.style.display = msg ? 'block' : 'none'; }
      function showSuccess(msg){ successEl.textContent = msg; successEl.style.display = msg ? 'block' : 'none'; }

      function now(){ return Date.now(); }
      function getBlockUntil(user){ const v = localStorage.getItem(blockKey(user)); return v ? Number(v) : 0; }
      function setBlock(user, s){ localStorage.setItem(blockKey(user), String(now() + s*1000)); }
      function clearBlock(user){ localStorage.removeItem(blockKey(user)); }
      function getAttempts(user){ const v = localStorage.getItem(attemptsKey(user)); if(!v) return {count:0,firstTs:0}; try{return JSON.parse(v);}catch{return {count:0,firstTs:0}} }
      function setAttempts(user,o){ localStorage.setItem(attemptsKey(user), JSON.stringify(o)); }
      function resetAttempts(user){ localStorage.removeItem(attemptsKey(user)); }
      function registerFailed(user){ const a=getAttempts(user); a.count=(a.count||0)+1; a.firstTs=a.firstTs||now(); setAttempts(user,a); return a.count; }
      function remaining(user){ const r=Math.ceil((getBlockUntil(user)-now())/1000); return r>0?r:0; }
      function setAuth(u){ localStorage.setItem('auth_user', u); localStorage.setItem('auth_time', String(now())); }

      function isBlocked(user){ return getBlockUntil(user) > now(); }

      function applyBlockUI(user){
        btn.disabled = true;
        const iv = setInterval(()=>{
          const r = remaining(user);
          if (r<=0){ clearInterval(iv); clearBlock(user); resetAttempts(user); btn.disabled=false; showError(''); }
          else showError(`Conta bloqueada. Tente novamente em ${r} s.`);
        }, 500);
      }

      form.addEventListener('submit', function(e){
        e.preventDefault();
        showError(''); showSuccess('');
        const u = (userEl.value||'').trim(), p = (passEl.value||'').trim();
        if(!u||!p){ showError('Preencha usuário e senha.'); return; }
        if(isBlocked(u)){ applyBlockUI(u); return; }

        if(VALID[u] && VALID[u] === p){
          resetAttempts(u); clearBlock(u); setAuth(u); showSuccess('Autenticado com sucesso.');
          if (u === 'admin') {
            window.location.href = 'http://localhost:3000/dashboard.html';
          } else if (u === 'operador') {
            window.location.href = 'http://localhost:3000/dashboardoperador.html';
          }
          return;
        }

        const fails = registerFailed(u);
        const left = Math.max(0, MAX_ATTEMPTS - fails);
        if (left <= 0) { setBlock(u, BLOCK_SECONDS); applyBlockUI(u); }
        else { showError(`Usuário ou senha inválidos. Restam ${left} tentativa(s).`); }
        passEl.value=''; passEl.focus();
      });

      document.addEventListener('DOMContentLoaded', ()=>{
        const cur = (userEl.value||'').trim() || 'default';
        if (isBlocked(cur)) applyBlockUI(cur);
      });
    })();
  </script>
</body>
</html>
